# 네이버 부동산 매물 모니터 설정
# 이 파일만 바꾸면 지역/매물종류/수집강도를 조정할 수 있습니다.

[crawl]
trade_type = "A1"                 # A1=매매 (B1=전세, B2=월세)
real_estate_types = ["TJ", "GM"]  # TJ=토지, GM=건물(통건물). 아파트=APT, 오피스텔=OPST ...
order = "dateDesc"                # 최신 등록순 (신규 조기중단에 필수)
request_delay_sec = 1.0           # 요청 간 기본 지연(차단 완화)
request_jitter_sec = 0.7          # 지연에 더할 무작위 지터(0~값)
max_pages_per_region = 25         # 동별 최대 페이지(안전장치)
max_retries = 3                   # 실패 시 재시도 횟수
timeout_sec = 20
early_stop = false                # true면 신규 없는 페이지에서 조기중단(넓은 범위·요청최소화용).
                                  # 단 스캔이 불완전해져 '삭제 매물' 판정을 생략합니다.
                                  # 강남3구처럼 좁은 범위는 false(전체 스캔) 권장.

[site]
title = "네이버 부동산 매매 매물 (토지·건물)"
subtitle = "강남·서초·송파 · 하루 2회 자동 수집"
timezone = "Asia/Seoul"
keep_days = 0                     # 삭제(더 이상 목격 안 됨) 매물 처리: 0=계속 누적 보관(제외 안 함),
                                  # N(>0)=마지막 목격 후 N일 지나면 목록에서 제외. 전체스캔일 때만 적용.

[deploy]
enabled = false                   # true면 git push 수행. VPS에서 GH_TOKEN 설정 후 켜기
repo = ""                         # 예: "username/naver-land-site"
branch = "gh-pages"
subdir = "."                      # 저장소 내 배포 경로("." 또는 "docs")
commit_name = "naver-land-bot"
commit_email = "bot@example.com"

# 대상 지역. 각 항목은 구(區) 또는 임의 cortarNo + 표시용 경로.
# 수도권 확장: 아래에 구를 더 추가하거나, 시도 코드(서울 1100000000 / 경기 4100000000 / 인천 2800000000)를
# cortarNo 로 넣으면 regions 단계에서 구→동까지 자동 전개됩니다.
[[regions]]
sido = "서울특별시"
gu = "강남구"
cortarNo = "1168000000"

[[regions]]
sido = "서울특별시"
gu = "서초구"
cortarNo = "1165000000"

[[regions]]
sido = "서울특별시"
gu = "송파구"
cortarNo = "1171000000"
