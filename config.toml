# 네이버 부동산 매물 모니터 설정
# 이 파일만 바꾸면 지역/매물종류/수집강도를 조정할 수 있습니다.

[crawl]
trade_type = "A1"                 # A1=매매 (B1=전세, B2=월세)
real_estate_types = ["TJ", "GM"]  # TJ=토지, GM=건물(통건물). 아파트=APT, 오피스텔=OPST ...
order = "dateDesc"                # 최신 등록순 (신규 조기중단에 필수)
request_delay_sec = 1.0           # 요청 간 기본 지연(차단 완화)
request_jitter_sec = 0.7          # 지연에 더할 무작위 지터(0~값)
max_pages_per_region = 25         # 동별 최대 페이지(안전장치)
max_retries = 3                   # 실패 시 재시도 횟수
timeout_sec = 20
early_stop = true                 # true=신규 위주(최신순, 이미 본 매물 나오면 조기중단).
                                  # 서울 전체를 하루 2회 돌아도 요청이 적어 차단 위험↓·빠름.
                                  # 목적이 '신규 단독 매물 체크'라 권장. false=전체 스캔(현재 시장 전부).

[site]
title = "네이버 부동산 매매 매물 (토지·건물)"
subtitle = "강남·서초·송파 · 하루 2회 자동 수집"
timezone = "Asia/Seoul"
keep_days = 14                    # 목록 유지 기간(0=무제한).
                                  # early_stop=true(신규 위주): 올라온 지 N일 지난 매물은 목록에서 제외
                                  #   → '최근 N일 신규 피드'. N=14면 최근 2주치.
                                  # early_stop=false(전체스캔): 마지막 목격 후 N일 지나면 제외(삭제 매물 정리).

[deploy]
enabled = false                   # true면 git push 수행. VPS에서 GH_TOKEN 설정 후 켜기
repo = ""                         # 예: "username/naver-land-site"
branch = "gh-pages"
subdir = "."                      # 저장소 내 배포 경로("." 또는 "docs")
commit_name = "naver-land-bot"
commit_email = "bot@example.com"

# 대상 지역. 시도 코드를 넣으면 구→동까지 자동 전개됩니다.
#   서울 1100000000 / 경기 4100000000 / 인천 2800000000
# 특정 구만 보려면 구 코드로 교체(예: 강남구 1168000000 / 서초구 1165000000 / 송파구 1171000000).
[[regions]]
sido = "서울특별시"
gu = ""
cortarNo = "1100000000"   # 서울 전체 25개 구 (약 467개 동, 수집에 15~20분 소요)
